name: Release
# Publishes the extracted @gregdavid13/* packages to GitHub Packages via
# Changesets. On a push to main, changesets/action either opens a "Version
# Packages" PR (when unreleased changesets exist) or, once that PR is merged,
# builds and publishes the bumped packages. See .changeset/README.md.
on:
  push:
    branches: [main]

concurrency: release-${{ github.ref }}

permissions:
  contents: write       # create the Version Packages PR / tags
  pull-requests: write  # open/update that PR
  packages: write       # publish to GitHub Packages

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://npm.pkg.github.com
      - run: pnpm install --frozen-lockfile
      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm run version-packages
          publish: pnpm run release
        env:
          GITHUB_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
